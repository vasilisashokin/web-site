<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>צור קשר</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <body class="contact-page">
   <h1>צור קשר</h1>

  <!-- 📌 מידע קבוע -->
  <div>
    <p>📧 מייל: example@gmail.com</p>
    <p>📞 טלפון: 050-1234567</p>

    <p>🌐 רשתות חברתיות:</p>
    <a href="#">Facebook</a> |
    <a href="#">Instagram</a> |
    <a href="#">LinkedIn</a>
  </div>

  <hr>

  <!-- 📌 טופס -->
  <form id="contactForm">

    <input type="text" id="fullname" placeholder="שם מלא"><br><br>
    <input type="email" id="email" placeholder="אימייל"><br><br>
    <input type="text" id="phone" placeholder="טלפון"><br><br>
    <input type="text" id="subject" placeholder="נושא ההודעה"><br><br>
    <textarea id="message" placeholder="תוכן ההודעה"></textarea><br><br>

    <button type="button" id="submitBtn">שלח</button>
  </form>

  <br>

  <button id="getBtn">שלח GET</button>
  <button id="postBtn">שלח POST</button>

  <script src="script.js"></script>
</body>
</html>
